# Platform namespaces — created at sync-wave -3, before any chart that
# might write PreSync hooks into them. Charts cannot be trusted to set
# the labels we need (Pod Security Standards in particular), so the
# platform team owns namespace creation explicitly.
#
# `kube-system` is intentionally excluded — it's GKE-managed and
# pre-exists with its own labels. argocd/projects/platform.yaml allows
# the platform AppProject to write into it, but the namespace itself
# isn't ours to create.
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.idp/component: observability
    pod-security.kubernetes.io/enforce: privileged   # KPS needs hostPath / hostNetwork on node-exporter
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.idp/component: logging
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.idp/component: cert-manager
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.idp/component: ingress
    # Ingress-nginx controller needs CAP_NET_BIND_SERVICE to bind 80/443
    # on the host; it runs under restricted-ish, not full restricted.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.idp/component: gatekeeper
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
