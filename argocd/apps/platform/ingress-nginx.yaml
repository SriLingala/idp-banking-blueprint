apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    platform.idp/scope: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          replicaCount: 2
          minAvailable: 1
          allowSnippetAnnotations: false  # snippet annotations are a known
                                          # injection vector
          ingressClassResource:
            default: true
          config:
            use-forwarded-headers: "true"
            enable-real-ip: "true"
            ssl-protocols: "TLSv1.2 TLSv1.3"
            ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
          service:
            type: LoadBalancer
            annotations:
              cloud.google.com/load-balancer-type: "Internal"
              networking.gke.io/internal-load-balancer-allow-global-access: "true"
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          podSecurityContext:
            runAsNonRoot: true
            runAsUser: 101
          containerSecurityContext:
            runAsNonRoot: true
            runAsUser: 101
            # readOnlyRootFilesystem is intentionally OFF on ingress-nginx-
            # controller. The controller rewrites /etc/nginx/nginx.conf on
            # every reload (its core architecture), and also writes to
            # /etc/ingress-controller/{ssl,telemetry}, /tmp/nginx, and
            # /var/log/nginx. We tried mounting emptyDirs for each of
            # these (PRs #14 and #15) and uncovered new paths each time;
            # /etc/nginx itself cannot be emptyDir'd without losing the
            # image's initial config. Upstream chart doesn't ship a clean
            # read-only-root mode for 1.11.x.
            #
            # Compensating controls retained on this container:
            #   - runAsNonRoot + runAsUser 101
            #   - allowPrivilegeEscalation=false
            #   - capabilities drop ALL, add only NET_BIND_SERVICE
            #   - Pod Security Standards baseline on the namespace
            #
            # See docs/compliance-notes.md "ingress-nginx exception" row.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
        defaultBackend:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
