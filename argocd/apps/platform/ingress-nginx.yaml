apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  labels:
    platform.idp/scope: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          replicaCount: 2
          minAvailable: 1
          allowSnippetAnnotations: false  # snippet annotations are a known
                                          # injection vector
          ingressClassResource:
            default: true
          config:
            use-forwarded-headers: "true"
            enable-real-ip: "true"
            ssl-protocols: "TLSv1.2 TLSv1.3"
            ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
          service:
            type: LoadBalancer
            annotations:
              cloud.google.com/load-balancer-type: "Internal"
              networking.gke.io/internal-load-balancer-allow-global-access: "true"
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          podSecurityContext:
            runAsNonRoot: true
            runAsUser: 101
          containerSecurityContext:
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          # readOnlyRootFilesystem=true forces us to provide writable
          # emptyDirs for the paths the controller writes to at runtime:
          #   - /etc/ingress-controller/ssl/   default fake SSL cert + per-Ingress certs
          #   - /tmp/nginx                     nginx temp files (proxy buffers, client bodies)
          #   - /var/log/nginx                 access + error logs
          # Without these, the controller CrashLoopBackOffs on first start
          # with "could not create PEM certificate file ... read-only file system".
          extraVolumes:
            - name: ingress-controller-ssl
              emptyDir: {}
            - name: nginx-tmp
              emptyDir: {}
            - name: nginx-log
              emptyDir: {}
          extraVolumeMounts:
            - name: ingress-controller-ssl
              mountPath: /etc/ingress-controller/ssl
            - name: nginx-tmp
              mountPath: /tmp/nginx
            - name: nginx-log
              mountPath: /var/log/nginx
        defaultBackend:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
