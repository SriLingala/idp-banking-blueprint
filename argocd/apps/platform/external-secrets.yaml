###############################################################################
# external-secrets operator
#
# Pulls tenant secret material from GCP Secret Manager and projects it into
# tenant namespaces as native Kubernetes Secrets. Workload Identity gives
# the operator a GCP identity per-tenant — there is NO static credential
# anywhere in the cluster.
#
# Why this exists in v1.5:
#   The v1.0 launch left tenant secrets "out of scope" — the trial
#   walkthrough simply told tenants to `kubectl create secret`. That
#   doesn't survive an audit: secrets are not in Git, not in version
#   control, not auditable across rotation, and not separable by tenant
#   at the storage layer. External Secrets fixes all four.
#
# Trust model:
#   - The operator runs as a KSA annotated with iam.gke.io/gcp-service-account.
#   - That KSA impersonates a GSA in the cluster's project.
#   - The GSA holds secretmanager.secretAccessor on a narrow path prefix
#     PER TENANT (set via Terraform when the tenant onboards).
#   - The K8sExternalSecretScope Gatekeeper constraint enforces that a
#     tenant cannot create an ExternalSecret pointing at another tenant's
#     Secret Manager path. Defence in depth — even if GSA IAM was
#     mis-bound, the admission gate refuses cross-tenant access.
#
# ADR-0005 documents the alternatives considered (sealed-secrets, sops,
# raw kubectl) and why ESO won.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels:
    platform.idp/scope: platform
  annotations:
    # Wave -1 — same wave as cert-manager and gatekeeper. ESO's CRDs
    # (ExternalSecret, SecretStore, ClusterSecretStore) need to be
    # registered before any tenant Application that references them can
    # sync. Lands alongside cert-manager so the platform-CRDs window is
    # one batch, not three.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        # HA topology — webhook can't be a SPOF in admission path.
        replicaCount: 2
        webhook:
          replicaCount: 2
          # ESO's validating webhook only checks ExternalSecret /
          # SecretStore shape; failure policy stays Fail so a broken
          # ExternalSecret manifest is caught at admission, not at
          # reconcile time three minutes later.
          failurePolicy: Fail
        certController:
          replicaCount: 2
        leaderElect: true
        resources:
          requests: { cpu: 50m,  memory: 128Mi }
          limits:   { cpu: 500m, memory: 256Mi }
        webhookResources:
          requests: { cpu: 25m,  memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
        certControllerResources:
          requests: { cpu: 25m,  memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
        # ServiceMonitor for kube-prometheus-stack scrape.
        serviceMonitor:
          enabled: true
        # The operator's KSA is annotated for Workload Identity by the
        # platform-level overlay (or directly here for the trial).
        # Tenants get their own per-namespace SecretStore that binds to
        # their own GSA via the same annotation pattern.
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            iam.gke.io/gcp-service-account: external-secrets@${PROJECT_ID}.iam.gserviceaccount.com

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
