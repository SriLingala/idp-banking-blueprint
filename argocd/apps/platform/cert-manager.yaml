apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  labels:
    platform.idp/scope: platform
  annotations:
    # Wave -1 — CRDs must land before anything that references them.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.15.3
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        replicaCount: 2
        webhook:
          replicaCount: 2
        cainjector:
          replicaCount: 2
        # By default cert-manager puts its leader-election Role + RoleBinding
        # into kube-system. Our platform AppProject does not — and should not —
        # grant write access to kube-system. Move the lease into the
        # cert-manager namespace, which the project already allows.
        global:
          leaderElection:
            namespace: cert-manager
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        # ServiceMonitor support is enabled but deferred: the
        # monitoring.coreos.com/ServiceMonitor CRD ships with
        # kube-prometheus-stack (wave 0). With SkipDryRunOnMissingResource
        # in syncOptions below, Argo CD skips the SM on first sync (wave
        # -1, KPS not installed yet) and applies it cleanly on the next
        # reconciliation after KPS lands.
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Tolerate the ServiceMonitor CRD not existing on first sync — it
      # lands with kube-prometheus-stack in wave 0. Reconciliation after
      # wave 0 picks it up.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
