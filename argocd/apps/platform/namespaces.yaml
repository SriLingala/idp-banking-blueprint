apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-namespaces
  namespace: argocd
  labels:
    platform.idp/scope: platform
  annotations:
    # Wave -3 — earlier than every other platform app. Platform charts
    # (KPS, cert-manager, ingress-nginx, Gatekeeper, …) have PreSync
    # hooks that try to land resources in their target namespace before
    # Argo CD's CreateNamespace option fires. Pre-creating the
    # namespaces here breaks the chicken-and-egg cleanly.
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/SriLingala/idp-banking-blueprint.git
    targetRevision: main
    path: argocd/manifests/platform-namespaces

  destination:
    server: https://kubernetes.default.svc
    # Destination namespace here is informational only — the actual
    # resources are cluster-scoped Namespace objects.
    namespace: argocd

  syncPolicy:
    automated:
      prune: false        # Never auto-delete platform namespaces
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
