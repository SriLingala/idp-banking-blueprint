name: YAML Lint

on:
  pull_request:
    paths:
      - "argocd/**"
      - "policies/opa/**"
      - ".github/workflows/yaml-lint.yml"
  push:
    branches:
      - main
    paths:
      - "argocd/**"
      - "policies/opa/**"
      - ".github/workflows/yaml-lint.yml"

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - argocd/
          - policies/opa/
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: ${{ matrix.path }}
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy:
                check-keys: false
              comments:
                min-spaces-from-content: 1
              indentation:
                spaces: 2
                indent-sequences: consistent
