################################################################################
# terraform-plan.yml
#
# PR-time plan for the Terraform stacks. Runs on every PR that touches a
# Terraform path. For each stack in the matrix it:
#
#   1. Authenticates to GCP via the READ-ONLY plan WIF identity (NOT one of
#      the per-stack apply SAs — even a misconfigured PR can't mint apply
#      credentials).
#   2. Runs `terraform init -backend-config=bucket=...` against the GCS
#      state bucket.
#   3. Runs `terraform plan -lock=false -no-color` and captures the output.
#   4. Uploads the binary tfplan as an artifact named after the PR + stack
#      so the apply workflow can consume the EXACT plan that was reviewed
#      — no re-planning at apply time.
#   5. Posts (or updates) a single PR comment with the plan summary for
#      every stack, collapsible details for each.
#
# Stacks split by runner:
#
#   - GitHub-hosted runners (ubuntu-latest): environments/dev-bootstrap,
#     environments/dev. Both reach only public GCP APIs at plan time.
#
#   - Self-hosted runner on the bastion (label: bastion): environments/
#     dev-platform, environments/dev-tenants. These stacks read state for
#     the cluster — and the GKE kubeconfig the providers eventually consume
#     points at the cluster's PRIVATE API endpoint, which a GitHub-hosted
#     runner cannot reach. The bastion runner sits inside the VPC and is
#     on the cluster's master_authorized_networks allowlist.
#
#     The bastion runner is registered by the cloud-init in
#     environments/dev-bootstrap/bastion.tf when var.github_runner_token
#     is set. Until the operator registers it, the private-cluster jobs
#     skip cleanly via the precheck below.
#
# Required repository variables (set once after the first dev-bootstrap apply
# via `gh variable set ...` — the bootstrap stack's `github_actions_secrets`
# output emits the exact commands):
#
#   GCP_PROJECT_ID            project to plan against
#   GCP_REGION                region for cluster + KMS
#   GCP_TFSTATE_BUCKET        GCS bucket holding terraform state
#   GCP_WIF_PLAN_PROVIDER     workload_identity_pool_provider resource path
#   GCP_TERRAFORM_PLAN_SA     terraform-plan@<project>.iam.gserviceaccount.com
################################################################################
name: Terraform Plan

on:
  pull_request:
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform-plan.yml"

# Concurrency: one plan workflow per PR at a time. Newer pushes cancel
# in-flight plans — saves runner minutes and keeps the latest plan
# attached to the PR.
concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Token permissions: the workflow needs to mint an OIDC token (id-token)
# and comment back on the PR (pull-requests).
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ── Precheck ────────────────────────────────────────────────────────────
  # The plan job below cannot do anything useful until the operator has
  # run `environments/dev-bootstrap` once and pasted the resulting
  # `gh variable set ...` block from its `github_actions_secrets` output.
  # Before that happens — i.e. on the very first PR a fresh clone of this
  # repo opens — the WIF identity does not exist and the workflow would
  # fail with a confusing "Permission denied" from google-github-actions/auth.
  #
  # This precheck inspects the required variables and skips downstream
  # plans cleanly if any are missing, with a single SKIP message that
  # tells the operator exactly what's not set. It also probes for a
  # registered self-hosted runner so the private-cluster plans skip
  # cleanly until the bastion runner is online.
  precheck:
    name: precheck (vars + runner availability)
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      bastion_runner_online: ${{ steps.runner.outputs.online }}
    steps:
      - id: check
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_TFSTATE_BUCKET: ${{ vars.GCP_TFSTATE_BUCKET }}
          GCP_WIF_PLAN_PROVIDER: ${{ vars.GCP_WIF_PLAN_PROVIDER }}
          GCP_TERRAFORM_PLAN_SA: ${{ vars.GCP_TERRAFORM_PLAN_SA }}
        run: |
          missing=()
          for v in GCP_PROJECT_ID GCP_REGION GCP_TFSTATE_BUCKET \
                   GCP_WIF_PLAN_PROVIDER GCP_TERRAFORM_PLAN_SA; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "## ⏭ terraform-plan skipped"
              echo ""
              echo "The following repository variables are not set:"
              echo ""
              for v in "${missing[@]}"; do
                echo "  - \`$v\`"
              done
              echo ""
              echo "Run \`environments/dev-bootstrap\` once and paste its"
              echo "\`github_actions_secrets\` output to wire them up."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Probe for the self-hosted runner by label. The list-runners API needs
      # a token with the `metadata:read` scope which the default GITHUB_TOKEN
      # has on this repo. If the API call fails (e.g. ACL prevents listing),
      # we conservatively treat the runner as offline and skip private-cluster
      # plans rather than blocking the PR.
      - id: runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          online_count=$(gh api \
              "/repos/${{ github.repository }}/actions/runners" \
              --paginate \
              --jq '[.runners[]? | select(.status=="online") | select(.labels[].name=="bastion")] | length' \
              2>/dev/null)
          if [ -z "$online_count" ]; then online_count=0; fi
          if [ "$online_count" -gt 0 ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
            echo "Bastion self-hosted runner online — private-cluster plans will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⏭ private-cluster plans skipped"
              echo ""
              echo "No \`bastion\`-labelled self-hosted runner is online."
              echo ""
              echo "Register one by setting \`github_runner_token\` on"
              echo "\`environments/dev-bootstrap\` and re-applying — the"
              echo "bastion cloud-init brings the runner up."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # Stacks reachable from a GitHub-hosted runner (no private cluster contact).
  plan-public:
    name: terraform plan — public (${{ matrix.stack }})
    needs: precheck
    if: needs.precheck.outputs.ready == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - environments/dev-bootstrap
          - environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/terraform-plan
        with:
          stack: ${{ matrix.stack }}
          wif_provider: ${{ vars.GCP_WIF_PLAN_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_PLAN_SA }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          state_bucket: ${{ vars.GCP_TFSTATE_BUCKET }}
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          actor: ${{ github.actor }}

  # Stacks that need the cluster's private API endpoint. Run on the
  # bastion self-hosted runner. Job-level `if` skips cleanly when the
  # runner isn't online — the PR shows a clear skip message instead of
  # a hung queue.
  plan-private:
    name: terraform plan — private (${{ matrix.stack }})
    needs: precheck
    if: needs.precheck.outputs.ready == 'true' && needs.precheck.outputs.bastion_runner_online == 'true'
    runs-on: [self-hosted, bastion]
    strategy:
      fail-fast: false
      matrix:
        stack:
          - environments/dev-platform
          - environments/dev-tenants
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/terraform-plan
        with:
          stack: ${{ matrix.stack }}
          wif_provider: ${{ vars.GCP_WIF_PLAN_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_PLAN_SA }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          state_bucket: ${{ vars.GCP_TFSTATE_BUCKET }}
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          actor: ${{ github.actor }}
