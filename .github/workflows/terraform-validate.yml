name: Terraform Validate

on:
  pull_request:
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform-validate.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: terraform fmt (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: terraform fmt -check (advisory)
        # Advisory only: prints a diff for any non-canonical formatting but does
        # not fail the workflow. Run `terraform fmt -recursive` locally to fix.
        run: |
          if ! terraform fmt -check -recursive -diff; then
            echo "::warning::Formatting drift detected. Run 'terraform fmt -recursive' locally."
          fi
        shell: bash

  validate:
    name: terraform validate (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - modules/gke-hardened
          - modules/tenant-namespace
          - modules/argocd-bootstrap
          - environments/dev
          - environments/dev-bootstrap
          - environments/dev-platform
          - environments/dev-tenants

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: terraform init (no backend)
        working-directory: ${{ matrix.path }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.path }}
        run: terraform validate -no-color
