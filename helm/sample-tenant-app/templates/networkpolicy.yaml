{{- if .Values.networkPolicies.allowIngressFromIngressNginx }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sample-tenant-app.fullname" . }}-allow-ingress-nginx
  labels:
    {{- include "sample-tenant-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sample-tenant-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
{{- end }}

{{- range $idx, $rule := .Values.networkPolicies.egress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sample-tenant-app.fullname" $ }}-egress-{{ $idx }}
  labels:
    {{- include "sample-tenant-app.labels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sample-tenant-app.selectorLabels" $ | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml $rule.namespaceLabels | nindent 14 }}
          {{- if $rule.podLabels }}
          podSelector:
            matchLabels:
              {{- toYaml $rule.podLabels | nindent 14 }}
          {{- end }}
      ports:
        {{- toYaml $rule.ports | nindent 8 }}
{{- end }}
