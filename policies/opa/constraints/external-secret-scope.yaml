apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sExternalSecretScope
metadata:
  name: external-secret-scope
  annotations:
    # Constraints must apply *after* their ConstraintTemplate has been
    # registered as a dynamic CRD by Gatekeeper. Templates land at the
    # default sync-wave (0); these Constraints sit at wave 1.
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["external-secrets.io"]
        kinds: ["ExternalSecret"]
    # Platform namespaces own the operator install + ClusterSecretStore;
    # they're trusted to read anything. Tenant namespaces — every other
    # namespace — are gated by the namespace's platform.idp/secret-prefix.
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - cert-manager
      - argocd
      - external-secrets
      - logging
      - monitoring
      - ingress-nginx
