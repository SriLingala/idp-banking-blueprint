apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPinWIServiceAccount
metadata:
  name: pin-wi-to-namespace
  annotations:
    # Constraints must apply *after* their ConstraintTemplate has been
    # registered as a dynamic CRD by Gatekeeper. Templates land at the
    # default sync-wave (0); these Constraints sit at wave 1.
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["ServiceAccount"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - cert-manager
      - argocd
