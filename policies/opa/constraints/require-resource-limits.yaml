apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireResourceLimits
metadata:
  name: require-resource-limits
  annotations:
    # Constraints must apply *after* their ConstraintTemplate has been
    # registered as a dynamic CRD by Gatekeeper. Templates land at the
    # default sync-wave (0); these Constraints sit at wave 1.
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - cert-manager
      - argocd
  parameters:
    exemptImages:
      - "gcr.io/gke-release/"
      - "registry.k8s.io/"
      - "k8s.gcr.io/"
