apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireTenantLabels
metadata:
  name: require-tenant-labels
  annotations:
    # Constraints must apply *after* their ConstraintTemplate has been
    # registered as a dynamic CRD by Gatekeeper. Templates land at the
    # default sync-wave (0); these Constraints sit at wave 1.
    argocd.argoproj.io/sync-wave: "1"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Namespace"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - cert-manager
      - ingress-nginx
      - monitoring
      - logging
      - argocd
      - default
  parameters:
    requiredLabels:
      - platform.idp/tenant
      - platform.idp/tier
