apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8spinwiserviceaccount
  annotations:
    metadata.gatekeeper.sh/title: "Pin Workload Identity to namespace's allowed GSAs"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: >-
      When a ServiceAccount carries the iam.gke.io/gcp-service-account
      annotation, the GSA email must be on the namespace's allow-list
      (platform.idp/allowed-gsa annotation, comma-separated). Stops a tenant
      from minting a KSA that impersonates another tenant's GSA.
spec:
  crd:
    spec:
      names:
        kind: K8sPinWIServiceAccount
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8spinwiserviceaccount

        violation[{"msg": msg}] {
          input.review.kind.kind == "ServiceAccount"
          gsa := input.review.object.metadata.annotations["iam.gke.io/gcp-service-account"]
          ns_allow := input.review.namespace.metadata.annotations["platform.idp/allowed-gsa"]
          not gsa_allowed(gsa, ns_allow)
          msg := sprintf(
            "ServiceAccount '%v/%v' impersonates '%v', which is not in platform.idp/allowed-gsa for the namespace",
            [input.review.object.metadata.namespace, input.review.object.metadata.name, gsa],
          )
        }

        gsa_allowed(gsa, allow) {
          allow != ""
          parts := split(allow, ",")
          some i
          trim_space(parts[i]) == gsa
        }
