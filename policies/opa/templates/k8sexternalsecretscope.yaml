apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sexternalsecretscope
  annotations:
    metadata.gatekeeper.sh/title: "ExternalSecret can only read the tenant's own Secret Manager prefix"
    metadata.gatekeeper.sh/version: "1.0.0"
    description: >-
      An ExternalSecret in tenant namespace <ns> can only reference remote
      keys whose names start with the prefix advertised on the namespace's
      platform.idp/secret-prefix annotation. Stops a tenant from defining
      an ExternalSecret pointing at another tenant's Secret Manager path —
      defence in depth against an IAM misbinding on the tenant GSA.
spec:
  crd:
    spec:
      names:
        kind: K8sExternalSecretScope
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sexternalsecretscope

        # Only validate ExternalSecret resources from the external-secrets
        # operator API group. Non-ESO resources are ignored.
        applies {
          input.review.kind.group == "external-secrets.io"
          input.review.kind.kind == "ExternalSecret"
        }

        # The tenant's allowed prefix lives as an annotation on the
        # namespace metadata Argo CD passes through with the admission
        # review. Empty / missing annotation => no prefix => deny every
        # ExternalSecret in that namespace (fail closed). The tenant
        # onboarding flow sets the annotation when the namespace is
        # created.
        ns_prefix := p {
          applies
          p := input.review.namespace.metadata.annotations["platform.idp/secret-prefix"]
        }

        # Collect the remote-key strings the ExternalSecret references.
        # Two ESO API shapes coexist: legacy spec.data[].remoteRef.key and
        # newer spec.dataFrom[].extract.key. Both are scoped here.
        remote_keys[k] {
          applies
          some i
          k := input.review.object.spec.data[i].remoteRef.key
        }
        remote_keys[k] {
          applies
          some i
          k := input.review.object.spec.dataFrom[i].extract.key
        }

        # Violations: any remote key whose name doesn't start with the
        # tenant's allowed prefix (or namespace has no prefix annotation
        # at all).
        violation[{"msg": msg}] {
          applies
          not ns_prefix
          msg := sprintf(
            "ExternalSecret '%v/%v' rejected — namespace has no platform.idp/secret-prefix annotation. Tenant onboarding must set this before any ExternalSecret can be created.",
            [input.review.object.metadata.namespace, input.review.object.metadata.name],
          )
        }

        violation[{"msg": msg}] {
          applies
          ns_prefix
          some k
          remote_keys[k]
          not startswith(k, ns_prefix)
          msg := sprintf(
            "ExternalSecret '%v/%v' rejected — remoteRef.key '%v' is outside the namespace's allowed prefix '%v'.",
            [input.review.object.metadata.namespace, input.review.object.metadata.name, k, ns_prefix],
          )
        }
